<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forgot Password - Hungry Bar</title>
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <a href="dashboard.html" class="back-home">Back Home</a>

    <div class="auth-card animate-in">
        <a href="index.html" class="brand-title">Hungry Bar</a>
        <h2>Forgot Password</h2>
        <p class="subtitle">Enter your registered email to reset your password.</p>

        <div class="input-group">
            <input type="email" id="forgotEmail" placeholder=" " required>
            <label>Email Address</label>
            <span class="icon"><i class="fas fa-envelope"></i></span>
        </div>

        <div id="forgotError" class="error-message"></div>
        <button class="btn-submit" onclick="forgotPassword()">Verify</button>

        <div class="auth-footer">
            <p>Remembered? <a href="login.html">Back to Login</a></p>
        </div>
    </div>

<script src="js/script.js"></script>
</body>
</html>
