<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hungry Bar | Track Order</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/track.css">
</head>
<body>

    <a href="order.html" class="back-home">Back to Order</a>

    <div class="track-container">
        <main class="track-card">
            <header class="track-header">
                <h1>Track Order</h1>
                <span class="order-id">Loading your status...</span>
            </header>

            <div class="tracking-stepper">
                <div class="step">
                    <div class="icon"><i class="fas fa-check"></i></div>
                    <div class="label">Order Placed</div>
                </div>
                <div class="step">
                    <div class="icon"><i class="fas fa-hamburger"></i></div>
                    <div class="label">Preparing</div>
                </div>
                <div class="step">
                    <div class="icon"><i class="fas fa-motorcycle"></i></div>
                    <div class="label">On the Way</div>
                </div>
                <div class="step">
                    <div class="icon"><i class="fas fa-home"></i></div>
                    <div class="label">Delivered</div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
