<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Register - Hungry Bar</title>
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <a href="dashboard.html" class="back-home">Back Home</a>

    <div class="auth-card animate-in">
        <a href="index.html" class="brand-title">Hungry Bar</a>
        <h2>Register</h2>

        <div class="input-group">
            <input type="text" id="regUser" placeholder=" " required>
            <label>Username</label>
            <span class="icon"><i class="fas fa-user"></i></span>
        </div>

        <div class="input-group">
            <input type="email" id="regEmail" placeholder=" " required
                   oninput="this.value=this.value.toLowerCase()">
            <label>Email Address</label>
            <span class="icon"><i class="fas fa-envelope"></i></span>
        </div>

        <div class="input-group">
            <input type="password" id="regPass" placeholder=" " required
                   oninput="toggleEyeVisibility('regPass','regEye')">
            <label>Password</label>
            <span class="toggle-password eye" id="regEye" onclick="togglePassword('regPass', this)" style="display:none;">
                <i class="fa-solid fa-eye-slash"></i>
            </span>
        </div>

        <div class="input-group">
            <input type="password" id="regConfirm" placeholder=" " required
                   oninput="toggleEyeVisibility('regConfirm','regConfirmEye')">
            <label>Confirm Password</label>
            <span class="toggle-password eye" id="regConfirmEye" onclick="togglePassword('regConfirm', this)" style="display:none;">
                <i class="fa-solid fa-eye-slash"></i>
            </span>
        </div>

        <div id="regError" class="error-message"></div>
        <button class="btn-submit" onclick="registerUser()">Register</button>

        <div class="auth-footer">
            <p>Already have an account? <a href="login.html">Login</a></p>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
